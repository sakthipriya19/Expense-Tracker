<h1>{{ btnNameChange ? 'Edit Expense' : 'Add Expense' }}</h1>
<hr />

<form>
  <div class="field-group">
    <label class="field-label">Description <span class="required">*</span></label>
    <input
      type="text"
      placeholder="e.g. Zomato, Electricity bill"
      [(ngModel)]="newExpense.title"
      name="title"
      [disabled]="isSaving"
    />
  </div>

  <div class="field-group">
    <label class="field-label">Category <span class="required">*</span></label>
    <select [(ngModel)]="newExpense.category" name="category" [disabled]="isSaving">
      <option value="" disabled>Select a category</option>
      <option>Travel</option>
      <option>Food</option>
      <option>Shopping</option>
      <option>HouseHold</option>
      <option>Education</option>
      <option>ChildCare</option>
    </select>
  </div>

  <div class="field-group">
    <label class="field-label">Amount (₹) <span class="required">*</span></label>
    <input
      type="number"
      placeholder="0.00"
      [(ngModel)]="newExpense.amount"
      name="amount"
      min="0.01"
      [disabled]="isSaving"
    />
  </div>

  <div class="field-group">
    <label class="field-label">Date <span class="required">*</span></label>
    <input
      type="date"
      [(ngModel)]="newExpense.date"
      name="date"
      [max]="today"
      [disabled]="isSaving"
    />
  </div>

  <hr />

  <div class="btn-row">
    <button class="btn-primary" type="button" (click)="addExpense()" [disabled]="isSaving">
      @if (isSaving) { <span class="spinner-inline"></span> }
      {{ isSaving ? 'Saving...' : (btnNameChange ? 'Update Expense' : 'Add Expense') }}
    </button>
    <button class="btn-secondary" type="button" (click)="clear()" [disabled]="isSaving">
      Cancel
    </button>
  </div>
</form>
